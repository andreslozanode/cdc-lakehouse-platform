# =============================================================================
# Configuración Flink optimizada para CDC streaming exactly-once
# =============================================================================

# --- Memoria / slots ---
jobmanager.memory.process.size: 1600m
taskmanager.memory.process.size: 4096m
taskmanager.numberOfTaskSlots: 4
parallelism.default: 4

# --- Checkpointing exactly-once (incremental RocksDB + unaligned) ---
execution.checkpointing.interval: 30s
execution.checkpointing.mode: EXACTLY_ONCE
execution.checkpointing.min-pause: 10s
execution.checkpointing.timeout: 10min
execution.checkpointing.max-concurrent-checkpoints: 1
execution.checkpointing.unaligned: true
execution.checkpointing.tolerable-failed-checkpoints: 3
execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION

state.backend.type: rocksdb
state.backend.incremental: true
state.backend.rocksdb.memory.managed: true
state.checkpoints.dir: s3a://lakehouse/flink/checkpoints
state.savepoints.dir: s3a://lakehouse/flink/savepoints
state.checkpoints.num-retained: 5

# --- Tolerancia a fallos ---
restart-strategy.type: exponential-delay
restart-strategy.exponential-delay.initial-backoff: 10s
restart-strategy.exponential-delay.max-backoff: 2min
restart-strategy.exponential-delay.reset-backoff-threshold: 10min

# --- Optimización Table/SQL ---
table.exec.mini-batch.enabled: true
table.exec.mini-batch.allow-latency: 2s
table.exec.mini-batch.size: 5000
table.optimizer.agg-phase-strategy: TWO_PHASE
table.exec.state.ttl: 36h
table.optimizer.distinct-agg.split.enabled: true

# --- S3 / MinIO ---
s3.endpoint: http://minio:9000
s3.path.style.access: true
s3.access-key: minioadmin
s3.secret-key: change_me_minio

# --- Métricas Prometheus ---
metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
metrics.reporter.prom.port: 9249
