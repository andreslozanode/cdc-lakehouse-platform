# =============================================================================
# CDC Streaming Lakehouse — stack local reproducible
# Levantar por capas con perfiles:
#   make up-core         # postgres, kafka, schema-registry, connect, minio, iceberg-rest
#   make up-process      # flink jobmanager/taskmanager
#   make up-serving      # clickhouse
#   make up-bi           # superset, grafana, prometheus
#   make up              # todo
# =============================================================================
name: cdc-lakehouse

x-common-env: &common-env
  TZ: America/Bogota

networks:
  lakehouse:
    driver: bridge

volumes:
  pg-data:
  kafka-data:
  minio-data:
  clickhouse-data:
  clickhouse-logs:
  superset-db-data:
  grafana-data:
  prometheus-data:
  flink-checkpoints:

services:
  # ---------------------------------------------------------------------------
  # ORIGEN OLTP — PostgreSQL con replicación lógica (wal_level=logical)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:${POSTGRES_VERSION:-16.4}
    container_name: postgres
    profiles: ["core", "all"]
    environment:
      <<: *common-env
      POSTGRES_DB: ${POSTGRES_DB:-oltp}
      POSTGRES_USER: ${POSTGRES_USER:-cdc_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "max_connections=200"
    ports: ["5432:5432"]
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cdc_admin} -d ${POSTGRES_DB:-oltp}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [lakehouse]

  # ---------------------------------------------------------------------------
  # KAFKA (KRaft, sin Zookeeper)
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:${CONFLUENT_VERSION:-7.8.0}
    container_name: kafka
    profiles: ["core", "all"]
    environment:
      <<: *common-env
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,EXTERNAL://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_COMPRESSION_TYPE: "zstd"
      KAFKA_NUM_PARTITIONS: ${DEFAULT_PARTITIONS:-12}
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports: ["9092:9092"]
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks: [lakehouse]

  # ---------------------------------------------------------------------------
  # SCHEMA REGISTRY (Avro, contratos + compatibilidad)
  # ---------------------------------------------------------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:${CONFLUENT_VERSION:-7.8.0}
    container_name: schema-registry
    profiles: ["core", "all"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka:29092"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: "backward"
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
    ports: ["8081:8081"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks: [lakehouse]

  # ---------------------------------------------------------------------------
  # KAFKA CONNECT + Debezium (captura CDC desde PostgreSQL)
  # ---------------------------------------------------------------------------
  connect:
    image: debezium/connect:${DEBEZIUM_VERSION:-3.1}
    container_name: connect
    profiles: ["core", "all"]
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      BOOTSTRAP_SERVERS: "kafka:29092"
      GROUP_ID: "cdc-connect-cluster"
      CONFIG_STORAGE_TOPIC: "_connect_configs"
      OFFSET_STORAGE_TOPIC: "_connect_offsets"
      STATUS_STORAGE_TOPIC: "_connect_status"
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      VALUE_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      ENABLE_DEBEZIUM_SCRIPTING: "true"
    ports: ["8083:8083"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [lakehouse]

  # ---------------------------------------------------------------------------
  # MinIO (S3 local) + bootstrap de buckets
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:${MINIO_VERSION:-RELEASE.2026-05-01T00-00-00Z}
    container_name: minio
    profiles: ["core", "all"]
    command: server /data --console-address ":9001"
    environment:
      <<: *common-env
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-change_me_minio}
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [lakehouse]

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    profiles: ["core", "all"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-change_me_minio} &&
      mc mb -p local/${LAKEHOUSE_BUCKET:-lakehouse} || true &&
      mc anonymous set none local/${LAKEHOUSE_BUCKET:-lakehouse} &&
      echo 'Buckets listos' "
    networks: [lakehouse]

  # ---------------------------------------------------------------------------
  # ICEBERG REST CATALOG (gobernanza de tablas Iceberg sobre S3)
  # ---------------------------------------------------------------------------
  iceberg-rest:
    image: apache/iceberg-rest-fixture:1.9.1
    container_name: iceberg-rest
    profiles: ["core", "all"]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      CATALOG_WAREHOUSE: "s3://${LAKEHOUSE_BUCKET:-lakehouse}/warehouse"
      CATALOG_IO__IMPL: "org.apache.iceberg.aws.s3.S3FileIO"
      CATALOG_S3_ENDPOINT: "http://minio:9000"
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-change_me_minio}
      AWS_REGION: ${S3_REGION:-us-east-1}
    ports: ["8181:8181"]
    networks: [lakehouse]

  # ---------------------------------------------------------------------------
  # FLINK (procesamiento de streams: CDC -> silver -> sinks)
  # ---------------------------------------------------------------------------
  jobmanager:
    build:
      context: ./infra/flink
      args:
        FLINK_VERSION: ${FLINK_VERSION:-1.20.5}
        ICEBERG_VERSION: ${ICEBERG_VERSION:-1.11.0}
        FLINK_CONNECTOR_KAFKA: ${FLINK_CONNECTOR_KAFKA:-3.3.0-1.20}
    image: cdc-lakehouse/flink:${FLINK_VERSION:-1.20.5}
    container_name: jobmanager
    profiles: ["process", "all"]
    command: jobmanager
    ports: ["8082:8081"]
    environment:
      <<: *common-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        rest.address: jobmanager
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-change_me_minio}
    volumes:
      - ./infra/flink/conf:/opt/flink/conf-extra:ro
      - ./flink-jobs:/opt/flink-jobs:ro
      - flink-checkpoints:/tmp/flink-checkpoints
    networks: [lakehouse]

  taskmanager:
    image: cdc-lakehouse/flink:${FLINK_VERSION:-1.20.5}
    container_name: taskmanager
    profiles: ["process", "all"]
    depends_on: [jobmanager]
    command: taskmanager
    scale: 1
    environment:
      <<: *common-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-change_me_minio}
    volumes:
      - ./flink-jobs:/opt/flink-jobs:ro
      - flink-checkpoints:/tmp/flink-checkpoints
    networks: [lakehouse]

  # ---------------------------------------------------------------------------
  # CLICKHOUSE (almacenamiento rápido / serving OLAP)
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-26.3}
    container_name: clickhouse
    profiles: ["serving", "all"]
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    environment:
      <<: *common-env
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-etl}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change_me_clickhouse}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports: ["8123:8123", "9009:9000"]
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./infra/clickhouse/config/config.d:/etc/clickhouse-server/config.d:ro
      - ./infra/clickhouse/users/users.d:/etc/clickhouse-server/users.d:ro
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [lakehouse]

  # ---------------------------------------------------------------------------
  # BI / OBSERVABILIDAD
  # ---------------------------------------------------------------------------
  superset-db:
    image: postgres:16.4
    container_name: superset-db
    profiles: ["bi", "all"]
    environment:
      <<: *common-env
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    volumes:
      - superset-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [lakehouse]

  superset-redis:
    image: redis:7-alpine
    container_name: superset-redis
    profiles: ["bi", "all"]
    networks: [lakehouse]

  superset:
    build:
      context: ./infra/superset
      args:
        SUPERSET_VERSION: ${SUPERSET_VERSION:-4.1.1}
    image: cdc-lakehouse/superset:${SUPERSET_VERSION:-4.1.1}
    container_name: superset
    profiles: ["bi", "all"]
    depends_on:
      superset-db:
        condition: service_healthy
      superset-redis:
        condition: service_started
    environment:
      <<: *common-env
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change_me_superset}
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-change_me_superset}
      DATABASE_URL: "postgresql+psycopg2://superset:superset@superset-db:5432/superset"
      REDIS_HOST: superset-redis
    ports: ["8088:8088"]
    networks: [lakehouse]

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.3.0}
    container_name: prometheus
    profiles: ["bi", "all"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports: ["9090:9090"]
    networks: [lakehouse]

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.6.0}
    container_name: grafana
    profiles: ["bi", "all"]
    depends_on: [prometheus]
    environment:
      <<: *common-env
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me_grafana}
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    ports: ["3000:3000"]
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks: [lakehouse]
