version: 2

models:
  - name: stg_customers
    description: "Clientes — estado actual deduplicado."
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: email
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[^@]+@[^@]+\\.[^@]+$"
      - name: segment
        tests:
          - accepted_values:
              values: ['standard', 'premium']
  - name: stg_orders
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: total_amount
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
  - name: stg_order_items
    columns:
      - name: order_item_id
        tests: [not_null, unique]
      - name: order_id
        tests:
          - relationships:
              to: ref('stg_orders')
              field: order_id
