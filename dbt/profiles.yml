# Las credenciales se inyectan por variables de entorno (CI/CD seguro).
cdc_lakehouse:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: clickhouse
      schema: analytics
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_HTTP_PORT', '8123') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'etl') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', 'change_me_clickhouse') }}"
      secure: false
      threads: "{{ env_var('DBT_THREADS', '8') | int }}"
      connect_timeout: 10
      send_receive_timeout: 300
      settings:
        allow_experimental_object_type: 1
    ci:
      type: clickhouse
      schema: gold
      host: "{{ env_var('DBT_CH_HOST', 'localhost') }}"
      port: "{{ env_var('DBT_CH_PORT', '8123') | int }}"
      user: "{{ env_var('DBT_CH_USER', 'default') }}"
      password: "{{ env_var('DBT_CH_PASSWORD', '') }}"
      secure: false
      threads: 4
      connect_timeout: 10
      send_receive_timeout: 300
    prod:
      type: clickhouse
      schema: analytics
      host: "{{ env_var('CLICKHOUSE_HOST') }}"
      port: "{{ env_var('CLICKHOUSE_HTTP_PORT', '8443') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD') }}"
      secure: true
      threads: 16
      cluster: "{{ env_var('CLICKHOUSE_CLUSTER', '') }}"
