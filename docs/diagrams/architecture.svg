<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <style>
      .lane{fill:#f8fafc;stroke:#e2e8f0;stroke-width:1.5;rx:14}
      .lane-t{fill:#475569;font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
      .node{rx:10;stroke-width:1.5}
      .nt{font-size:13px;font-weight:600;fill:#0f172a}
      .ns{font-size:10.5px;fill:#475569}
      .edge{stroke:#64748b;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
      .edge-d{stroke:#94a3b8;stroke-width:1.4;fill:none;stroke-dasharray:4 3;marker-end:url(#arrow)}
      .el{font-size:9.5px;fill:#64748b}
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="620" fill="#ffffff"/>
  <text x="32" y="40" font-size="22" font-weight="800" fill="#0f172a">CDC Streaming Lakehouse — Arquitectura</text>
  <text x="32" y="62" font-size="12.5" fill="#64748b">PostgreSQL → Debezium → Kafka → Flink → (ClickHouse hot · Iceberg/S3 cold) → dbt → Superset / Grafana / ML</text>

  <!-- Lanes -->
  <rect class="lane" x="32"   y="90" width="150" height="470"/>
  <text class="lane-t" x="107" y="112" text-anchor="middle">Fuente</text>
  <rect class="lane" x="200"  y="90" width="160" height="470"/>
  <text class="lane-t" x="280" y="112" text-anchor="middle">Captura + Bus</text>
  <rect class="lane" x="378"  y="90" width="170" height="470"/>
  <text class="lane-t" x="463" y="112" text-anchor="middle">Procesamiento</text>
  <rect class="lane" x="566"  y="90" width="180" height="470"/>
  <text class="lane-t" x="656" y="112" text-anchor="middle">Lakehouse</text>
  <rect class="lane" x="764"  y="90" width="180" height="470"/>
  <text class="lane-t" x="854" y="112" text-anchor="middle">Serving + dbt</text>
  <rect class="lane" x="962"  y="90" width="286" height="470"/>
  <text class="lane-t" x="1105" y="112" text-anchor="middle">Consumo</text>

  <!-- Source -->
  <rect class="node" x="52" y="250" width="110" height="64" fill="#e0f2fe" stroke="#38bdf8"/>
  <text class="nt" x="107" y="276" text-anchor="middle">PostgreSQL 16</text>
  <text class="ns" x="107" y="293" text-anchor="middle">wal_level=logical</text>
  <text class="ns" x="107" y="306" text-anchor="middle">REPLICA IDENTITY FULL</text>

  <!-- Capture + bus -->
  <rect class="node" x="216" y="180" width="128" height="58" fill="#fae8ff" stroke="#d946ef"/>
  <text class="nt" x="280" y="204" text-anchor="middle">Debezium 3.1</text>
  <text class="ns" x="280" y="220" text-anchor="middle">pgoutput · envelope</text>
  <rect class="node" x="216" y="262" width="128" height="58" fill="#ede9fe" stroke="#8b5cf6"/>
  <text class="nt" x="280" y="286" text-anchor="middle">Kafka 3.8 (KRaft)</text>
  <text class="ns" x="280" y="302" text-anchor="middle">zstd · 12 part.</text>
  <rect class="node" x="216" y="344" width="128" height="50" fill="#f1f5f9" stroke="#94a3b8"/>
  <text class="nt" x="280" y="365" text-anchor="middle">Schema Registry</text>
  <text class="ns" x="280" y="380" text-anchor="middle">Avro · BACKWARD</text>

  <!-- Processing -->
  <rect class="node" x="396" y="250" width="134" height="64" fill="#dcfce7" stroke="#22c55e"/>
  <text class="nt" x="463" y="274" text-anchor="middle">Apache Flink 1.20</text>
  <text class="ns" x="463" y="290" text-anchor="middle">debezium-avro-confluent</text>
  <text class="ns" x="463" y="303" text-anchor="middle">exactly-once · RocksDB</text>

  <!-- Lakehouse -->
  <rect class="node" x="586" y="190" width="142" height="58" fill="#fff7ed" stroke="#fb923c"/>
  <text class="nt" x="657" y="214" text-anchor="middle">Bronze (Iceberg)</text>
  <text class="ns" x="657" y="230" text-anchor="middle">append-only audit</text>
  <rect class="node" x="586" y="296" width="142" height="58" fill="#fff7ed" stroke="#f97316"/>
  <text class="nt" x="657" y="320" text-anchor="middle">Silver (Iceberg v2)</text>
  <text class="ns" x="657" y="336" text-anchor="middle">upsert · time-travel</text>

  <!-- Serving + dbt -->
  <rect class="node" x="784" y="190" width="142" height="58" fill="#fef9c3" stroke="#eab308"/>
  <text class="nt" x="855" y="214" text-anchor="middle">ClickHouse 26.3</text>
  <text class="ns" x="855" y="230" text-anchor="middle">ReplacingMergeTree</text>
  <rect class="node" x="784" y="296" width="142" height="58" fill="#fef9c3" stroke="#ca8a04"/>
  <text class="nt" x="855" y="320" text-anchor="middle">Gold marts</text>
  <text class="ns" x="855" y="336" text-anchor="middle">AggregatingMergeTree MV</text>
  <rect class="node" x="784" y="402" width="142" height="50" fill="#f1f5f9" stroke="#94a3b8"/>
  <text class="nt" x="855" y="423" text-anchor="middle">dbt</text>
  <text class="ns" x="855" y="438" text-anchor="middle">contracts · tests · SCD2</text>

  <!-- Consume -->
  <rect class="node" x="982" y="170" width="120" height="52" fill="#e0e7ff" stroke="#6366f1"/>
  <text class="nt" x="1042" y="192" text-anchor="middle">Superset</text>
  <text class="ns" x="1042" y="207" text-anchor="middle">BI / Reporting</text>
  <rect class="node" x="1122" y="170" width="106" height="52" fill="#e0e7ff" stroke="#6366f1"/>
  <text class="nt" x="1175" y="192" text-anchor="middle">Grafana</text>
  <text class="ns" x="1175" y="207" text-anchor="middle">observabilidad</text>
  <rect class="node" x="982" y="290" width="246" height="62" fill="#dcfce7" stroke="#16a34a"/>
  <text class="nt" x="1105" y="314" text-anchor="middle">ML / AI</text>
  <text class="ns" x="1105" y="330" text-anchor="middle">PyIceberg time-travel · MLflow · RFM</text>
  <rect class="node" x="982" y="402" width="246" height="50" fill="#f1f5f9" stroke="#94a3b8"/>
  <text class="nt" x="1105" y="423" text-anchor="middle">Prometheus</text>
  <text class="ns" x="1105" y="438" text-anchor="middle">scrape Flink · CH · Kafka</text>

  <!-- Edges -->
  <path class="edge" d="M162,282 L214,210"/>
  <path class="edge" d="M280,238 L280,260"/>
  <path class="edge-d" d="M280,320 L280,342"/>
  <path class="edge" d="M344,286 L394,282"/>
  <path class="edge-d" d="M394,300 L346,360"/>
  <path class="edge" d="M530,268 C560,250 560,230 584,220"/>
  <text class="el" x="548" y="240">append</text>
  <path class="edge" d="M530,296 C560,310 560,325 584,325"/>
  <text class="el" x="548" y="312">upsert</text>
  <path class="edge" d="M530,282 C640,420 700,300 782,225"/>
  <text class="el" x="610" y="370">JDBC sink</text>
  <path class="edge" d="M855,248 L855,294"/>
  <path class="edge" d="M855,402 L855,356"/>
  <path class="edge" d="M926,310 L980,200"/>
  <path class="edge" d="M926,320 L980,316"/>
  <path class="edge" d="M728,330 C840,470 900,360 982,330"/>
  <text class="el" x="790" y="420">point-in-time</text>
  <path class="edge-d" d="M463,314 C600,560 850,520 1105,452"/>
  <text class="el" x="700" y="540">metrics → Prometheus → Grafana</text>
  <path class="edge" d="M1102,420 C1140,360 1160,260 1170,224"/>
</svg>
